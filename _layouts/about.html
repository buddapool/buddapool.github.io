<!DOCTYPE html>
<html>

  <!-- Head -->
  {%- include head.html -%}

  <body>

    <!-- Navigation -->
    {%- include navigation.html -%}

    <!-- Header -->
    {%- include aboutheader.html -%}

    <!-- About page title block -->
    <div class="about-title-block">
      <h1>{{ page.name }}</h1>
      <span class="section-divider"></span>
      {% if page.open_source %}
        <p class="about-subtitle">{{ page.open_source }}</p>
      {% endif %}
    </div>

    <!-- About page content — wider container -->
    <main id="main" role="main">
      <div class="container px-4 px-lg-5">
        <div class="row justify-content-center">
          <div class="col-lg-9 col-xl-8">
            {{ content }}
            <a href="/" class="back-home-btn mt-4">
              <i class="fas fa-chevron-left"></i> Back to Home
            </a>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    {%- include footer.html -%}

  </body>
</html>
